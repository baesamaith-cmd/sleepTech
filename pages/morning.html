<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Morning Check-in - SleepTech</title>
  <link rel="stylesheet" href="assets/styles.css">
  <script>window.API_BASE_URL = 'YOUR_VERCEL_APP'</script>
</head>
<body>
  <div class="container">
    <header>
      <div class="logo">☀️</div>
      <h1>Morning Check-in</h1>
      <p class="subtitle">How did you sleep?</p>
    </header>

    <div class="card">
      <form id="morningForm">
        <div class="form-group">
          <label for="sleep_time">Bedtime (last night)</label>
          <input type="time" id="sleep_time" required>
        </div>

        <div class="form-group">
          <label for="wake_time">Wake time</label>
          <input type="time" id="wake_time" required>
        </div>

        <div class="form-group">
          <label>Sleep Quality</label>
          <div class="rating-group">
            <div class="rating-option">
              <input type="radio" name="sleep_quality" id="sq1" value="1">
              <label for="sq1">😴</label>
            </div>
            <div class="rating-option">
              <input type="radio" name="sleep_quality" id="sq2" value="2">
              <label for="sq2">😐</label>
            </div>
            <div class="rating-option">
              <input type="radio" name="sleep_quality" id="sq3" value="3" checked>
              <label for="sq3">🙂</label>
            </div>
            <div class="rating-option">
              <input type="radio" name="sleep_quality" id="sq4" value="4">
              <label for="sq4">😊</label>
            </div>
            <div class="rating-option">
              <input type="radio" name="sleep_quality" id="sq5" value="5">
              <label for="sq5">😁</label>
            </div>
          </div>
        </div>

        <div class="form-group">
          <label for="awakenings">Number of awakenings</label>
          <input type="number" id="awakenings" min="0" max="20" value="0">
        </div>

        <div class="form-group">
          <label for="memo">Notes (optional)</label>
          <textarea id="memo" placeholder="How do you feel? Any dreams?"></textarea>
        </div>

        <button type="submit" class="btn" id="submitBtn">Save Morning Log</button>
      </form>

      <div id="message" class="message"></div>
    </div>

    <div class="nav-links">
      <a href="index.html">🏠 Home</a>
      <a href="evening.html">🌙 Evening</a>
    </div>
  </div>

  <footer>
    <p>Data stored in your private GitHub repo</p>
  </footer>

  <script src="assets/app.js"></script>
</body>
</html>
