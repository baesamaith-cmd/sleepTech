<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>저녁 수면 일지 - Nod</title>
  <link rel="stylesheet" href="assets/styles.css">
  <script>window.API_BASE_URL = 'https://sleep-tech-five.vercel.app'</script>
</head>
<body>
  <div class="container">
    <header class="page-header">
      <div class="logo">🌙 <h1>저녁 수면 일지</h1></div>
      <p class="subtitle">오늘 밤 수면 압박과 계획을 확인하세요.</p>
    </header>

    <section class="card recommendation-card is-hidden" id="recommendationCard">
      <p class="eyebrow">취침 권장 시간</p>
      <div class="time-display" id="bedtimeWindow">--:-- ~ --:--</div>
      <p class="recommendation-reason" id="bedtimeReason"></p>
      <p class="recommendation-tip" id="bedtimeTip"></p>
      <p class="helper-text" id="confidenceNote"></p>
    </section>

    <section class="card">
      <form id="eveningForm">
        <section class="card">
          <div class="form-group">
            <div class="label-row">
              <label for="diary_date">날짜</label>
            </div>
            <input type="date" id="diary_date" class="input-large">
          </div>
        </section>

        <div class="field-grid two-up">
          <div class="form-group">
            <label>오후 4시 이후 카페인</label>
            <div class="toggle-group">
              <div class="toggle-option"><input type="radio" name="caffeine" id="caffeine_yes" value="yes"><label for="caffeine_yes">예</label></div>
              <div class="toggle-option"><input type="radio" name="caffeine" id="caffeine_no" value="no" checked><label for="caffeine_no">아니요</label></div>
            </div>
          </div>
          <div class="form-group">
            <label>음주</label>
            <div class="toggle-group" id="alcohol_group">
              <div class="toggle-option"><input type="radio" name="alcohol" id="alcohol_yes" value="yes"><label for="alcohol_yes">예</label></div>
              <div class="toggle-option"><input type="radio" name="alcohol" id="alcohol_no" value="no" checked><label for="alcohol_no">아니요</label></div>
            </div>
            <div class="rating-group compact-rating" id="alcohol_amount" style="margin-top: 8px; display: none;">
              <div class="rating-option"><input type="radio" name="alcohol_amount" id="alc_high" value="high"><label for="alc_high"><span>많이</span></label></div>
              <div class="rating-option"><input type="radio" name="alcohol_amount" id="alc_moderate" value="moderate" checked><label for="alc_moderate"><span>보통</span></label></div>
              <div class="rating-option"><input type="radio" name="alcohol_amount" id="alc_light" value="light"><label for="alc_light"><span>조금</span></label></div>
            </div>
          </div>
        </div>

        <div class="field-grid two-up">
          <div class="form-group">
            <label>오늘 운동</label>
            <div class="toggle-group">
              <div class="toggle-option"><input type="radio" name="exercise" id="exercise_yes" value="yes"><label for="exercise_yes">예</label></div>
              <div class="toggle-option"><input type="radio" name="exercise" id="exercise_no" value="no" checked><label for="exercise_no">아니요</label></div>
            </div>
          </div>
          <div class="form-group">
            <label>오늘 낮잠</label>
            <div class="toggle-group">
              <div class="toggle-option"><input type="radio" name="nap" id="nap_yes" value="yes"><label for="nap_yes">예</label></div>
              <div class="toggle-option"><input type="radio" name="nap" id="nap_no" value="no" checked><label for="nap_no">아니요</label></div>
            </div>
            <input type="number" id="nap_duration" class="input-large" placeholder="낮잠 시간(분)" style="margin-top: 8px; display: none;" min="5" step="5" value="15">
          </div>
        </div>

        <section class="card">
          <div class="form-group">
            <div class="label-row">
              <label for="memo">메모 (선택 사항)</label>
              <button type="button" class="voice-btn" data-voice-target="memo">🎤 음성 입력</button>
            </div>
            <textarea id="memo" placeholder="오늘 밤 수면에 영향을 줄 만한 일이 있나요?"></textarea>
          </div>
        </section>

        <button type="submit" class="btn" id="submitBtn">저녁 일지 저장</button>
      </form>

      <div id="message" class="message"></div>
    </section>

    <div class="nav-links">
      <a href="index.html">🏠 홈</a>
      <a href="morning.html">☀️ 아침</a>
    </div>
  </div>

  <footer>
    <p>일지는 나를 평가하는 도구가 아니라 패턴을 발견하는 도구입니다.</p>
  </footer>

      <script>
        document.addEventListener('DOMContentLoaded', () => {
          const today = new Date();
          today.setMinutes(today.getMinutes() - today.getTimezoneOffset());
          document.getElementById('diary_date').value = today.toISOString().split('T')[0];
          const napYes = document.getElementById('nap_yes');
          const napNo = document.getElementById('nap_no');
          const napDuration = document.getElementById('nap_duration');
          
          [napYes, napNo].forEach(radio => {
            radio.addEventListener('change', () => {
              napDuration.style.display = napYes.checked ? 'block' : 'none';
            });
          });

          const alcoholYes = document.getElementById('alcohol_yes');
          const alcoholNo = document.getElementById('alcohol_no');
          const alcoholAmount = document.getElementById('alcohol_amount');

          [alcoholYes, alcoholNo].forEach(radio => {
            radio.addEventListener('change', () => {
              alcoholAmount.style.display = alcoholYes.checked ? 'block' : 'none';
            });
          });
        });
      </script>
      <script src="assets/app.js"></script>
    </body>
</html>
