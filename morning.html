<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>아침 수면 일지 - Nod</title>
  <link rel="stylesheet" href="assets/styles.css">
  <script>window.API_BASE_URL = 'https://sleep-tech-five.vercel.app'</script>
</head>
<body>
  <div class="container">
    <header class="page-header">
      <div class="logo">☀️</div>
      <h1>아침 수면 일지</h1>
      <p class="subtitle">간단하게 기록하세요. 대략적인 기록만으로도 패턴을 파악할 수 있습니다.</p>
    </header>

    <section class="card compact-card">
      <p class="eyebrow">가장 중요한 것</p>
      <p class="helper-text">간밤의 전반적인 수면 형태를 먼저 기록하세요. 자세한 내용은 필요할 때만 추가하면 됩니다.</p>
    </section>

    <section class="card">
      <form id="morningForm">
        <div class="field-grid two-up">
          <div class="form-group">
            <div class="label-row">
              <label for="diary_date">날짜</label>
            </div>
            <input type="date" id="diary_date" class="input-large" required>
          </div>
        </div>
        <script>
          document.addEventListener('DOMContentLoaded', () => {
            const today = new Date();
            today.setMinutes(today.getMinutes() - today.getTimezoneOffset());
            document.getElementById('diary_date').value = today.toISOString().split('T')[0];
          });
        </script>

        <div class="field-grid two-up">
          <div class="form-group">
            <label for="bedtime">전날 잠든 시간</label>
            <input type="time" id="bedtime" class="input-large" required>
          </div>
          <div class="form-group">
            <label for="wake_time">오늘 아침 기상 시간</label>
            <input type="time" id="wake_time" class="input-large" required>
          </div>
        </div>

        <div class="field-grid two-up">
          <div class="form-group">
            <label>수면 질 (1-5)</label>
            <div class="rating-group compact-rating">
              <div class="rating-option"><input type="radio" name="sleep_quality" id="sq1" value="1"><label for="sq1">1</label></div>
              <div class="rating-option"><input type="radio" name="sleep_quality" id="sq2" value="2"><label for="sq2">2</label></div>
              <div class="rating-option"><input type="radio" name="sleep_quality" id="sq3" value="3" checked><label for="sq3">3</label></div>
              <div class="rating-option"><input type="radio" name="sleep_quality" id="sq4" value="4"><label for="sq4">4</label></div>
              <div class="rating-option"><input type="radio" name="sleep_quality" id="sq5" value="5"><label for="sq5">5</label></div>
            </div>
          </div>
          <div class="form-group">
            <label for="awakenings">중간에 깬 횟수</label>
            <input type="number" id="awakenings" min="0" max="20" value="0">
          </div>
        </div>

        <div class="field-grid two-up">
          <div class="form-group">
            <label>아침 컨디션 (1-5)</label>
            <div class="rating-group compact-rating">
              <div class="rating-option"><input type="radio" name="morning_energy" id="me1" value="1"><label for="me1">1</label></div>
              <div class="rating-option"><input type="radio" name="morning_energy" id="me2" value="2"><label for="me2">2</label></div>
              <div class="rating-option"><input type="radio" name="morning_energy" id="me3" value="3" checked><label for="me3">3</label></div>
              <div class="rating-option"><input type="radio" name="morning_energy" id="me4" value="4"><label for="me4">4</label></div>
              <div class="rating-option"><input type="radio" name="morning_energy" id="me5" value="5"><label for="me5">5</label></div>
            </div>
          </div>
          <div class="form-group">
            <div class="label-row">
              <label for="memo">메모</label>
              <button type="button" class="voice-btn" data-voice-target="memo">🎤 음성 입력</button>
            </div>
            <textarea id="memo" placeholder="기록할 만한 내용이 있나요?"></textarea>
          </div>
        </div>

        <details class="details-card">
          <summary>상세 기록</summary>
          <p class="helper-text details-helper">CBT-I(인지행동치료)를 위한 상세 기록입니다. 선택 사항입니다.</p>
          <div class="field-grid two-up">
            <div class="form-group">
              <label for="time_in_bed">침대에 들어간 시간</label>
              <input type="time" id="time_in_bed">
            </div>
            <div class="form-group">
              <label for="lights_out_time">불을 끈 시간</label>
              <input type="time" id="lights_out_time">
            </div>
          </div>

          <div class="field-grid two-up">
            <div class="form-group">
              <label for="sleep_onset_latency">잠들기까지 걸린 시간 (분)</label>
              <input type="number" id="sleep_onset_latency" min="0" max="300" value="20">
            </div>
            <div class="form-group">
              <label for="total_awake_time">밤에 깨어있던 총 시간 (분)</label>
              <input type="number" id="total_awake_time" min="0" max="600" value="0">
            </div>
          </div>

          <div class="field-grid two-up">
            <div class="form-group">
              <label for="final_wake_time">최종 기상 시간</label>
              <input type="time" id="final_wake_time">
            </div>
            <div class="form-group">
              <label for="out_of_bed_time">침대에서 나온 시간</label>
              <input type="time" id="out_of_bed_time">
            </div>
          </div>

          <div class="form-group">
            <label for="daytime_sleepiness">낮 시간 졸림 정도 (1-5)</label>
            <select id="daytime_sleepiness">
              <option value="1">1, 졸리지 않음</option>
              <option value="2">2</option>
              <option value="3" selected>3</option>
              <option value="4">4</option>
              <option value="5">5, 매우 졸림</option>
            </select>
          </div>
        </details>

        <button type="submit" class="btn" id="submitBtn">아침 일지 저장</button>
      </form>
      <div id="message" class="message"></div>
    </section>

    <div class="nav-links">
      <a href="index.html">🏠 홈</a>
      <a href="evening.html">🌙 저녁</a>
    </div>
  </div>

  <footer>
    <p>완벽함보다 꾸준함이 중요합니다.</p>
  </footer>

  <script src="assets/app.js"></script>
</body>
</html>
