<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nod 아침 체크인</title>
  <link rel="stylesheet" href="assets/styles.css">
  <script>window.API_BASE_URL = 'https://sleep-tech-five.vercel.app'</script>
</head>
<body class="theme-morning">
  <div class="container">
    <header class="hero compact-hero">
      <div class="hero-badge">☀️ 아침 기록</div>
      <h1>어젯밤 수면은<br>어떻게 되었나요?</h1>
      <p class="subtitle">아침 30초, 시간 두 개와 수면 질만 선택하면 충분해요.</p>
    </header>

    <section class="card summary-card is-hidden" id="previousSummaryCard">
      <p class="eyebrow">바로 직전 기록 요약</p>
      <p class="summary-copy" id="previousSummaryText"></p>
    </section>

    <section class="card">
      <form id="morningForm">
        <div class="form-group">
          <label for="sleep_time">어젯밤 잠든 시간</label>
          <input type="time" id="sleep_time" required>
        </div>

        <div class="form-group">
          <label for="wake_time">오늘 일어난 시간</label>
          <input type="time" id="wake_time" required>
        </div>

        <div class="form-group compact-rating">
          <label>오늘 수면 질</label>
          <div class="rating-group">
            <div class="rating-option">
              <input type="radio" name="sleep_quality" id="sq1" value="1">
              <label for="sq1">😴</label>
            </div>
            <div class="rating-option">
              <input type="radio" name="sleep_quality" id="sq2" value="2">
              <label for="sq2">😐</label>
            </div>
            <div class="rating-option">
              <input type="radio" name="sleep_quality" id="sq3" value="3" checked>
              <label for="sq3">🙂</label>
            </div>
            <div class="rating-option">
              <input type="radio" name="sleep_quality" id="sq4" value="4">
              <label for="sq4">😊</label>
            </div>
            <div class="rating-option">
              <input type="radio" name="sleep_quality" id="sq5" value="5">
              <label for="sq5">😁</label>
            </div>
          </div>
        </div>

        <button type="submit" class="btn" id="submitBtn">저장하기</button>

        <div class="optional-section">
          <details>
            <summary>+ 메모 남기기 (선택)</summary>
            <div class="form-group">
              <label for="awakenings">자고 깬 횟수</label>
              <input type="number" id="awakenings" min="0" max="20" value="0">
            </div>
            <div class="form-group">
              <div class="label-row">
                <label for="memo">메모</label>
                <button type="button" class="voice-btn" data-voice-target="memo">🎤</button>
              </div>
              <textarea id="memo" placeholder="기억나는 대로"></textarea>
            </div>
          </details>
        </div>
      </form>

      <div id="message" class="message"></div>
    </section>

    <section class="card muted-card">
      <p class="eyebrow">기록 팁</p>
      <p class="helper-text">완벽하게 적지 않아도 돼요. 흐름을 남기는 게 더 중요해요.</p>
    </section>

    <div class="nav-links">
      <a href="index.html">🏠 홈으로</a>
      <a href="evening.html">🌙 저녁 기록</a>
    </div>
  </div>

  <footer>
    <p>이 기록은 웰니스 루틴 정리를 위한 것이며, 의료적 판단을 대신하지 않습니다.</p>
  </footer>

  <script src="assets/app.js"></script>
</body>
</html>
